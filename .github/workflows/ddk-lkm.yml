name: DDK Build Kernel Module

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version (e.g., android14-6.1)'
        required: true
        type: string
      ddk_release:
        description: 'DDK container release tag'
        required: false
        default: '20251016'
        type: string
      module_name:
        description: 'Kernel module name (without .ko)'
        required: false
        default: 'android-wuwa'
        type: string

jobs:
  build-module:
    name: Build ${{ inputs.module_name }} for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Compile Kernel Module
      run: |
        echo "=== Building ${{ inputs.module_name }}.ko for KMI: ${{ inputs.kmi }} ==="
        
        # 【核心改动 1】：增加 PAHOLE=/bin/false 彻底从源头禁止生成 BTF 
        # 因为 BTF 是由 pahole 工具生成的，直接把这个工具指向空，它就绝对生不出来！
        make KDIR=$KERNEL_SRC CONFIG_DEBUG_INFO_BTF=n PAHOLE=/bin/false modules
        
        mkdir -p /github/workspace/out
        
        FULL_KMI="${{ inputs.kmi }}"
        DEBUG_KO="${FULL_KMI}-debug.ko"
        RELEASE_KO="${FULL_KMI}-release.ko"
        
        cp "${{ inputs.module_name }}.ko" "/github/workspace/out/$DEBUG_KO"
        cp "${{ inputs.module_name }}.ko" "/github/workspace/out/$RELEASE_KO"
        
        # 【核心改动 2】：使用更彻底的剥离命令，强行剔除所有调试信息和 BTF 段
        # 注意 --remove-section=.BTF 前面有一个点
        if [ -n "$STRIP" ] && command -v "$STRIP" &> /dev/null; then
            $STRIP --strip-debug --remove-section=.BTF "/github/workspace/out/$RELEASE_KO"
        elif [ -n "$CROSS_COMPILE" ] && command -v "${CROSS_COMPILE}strip" &> /dev/null; then
            ${CROSS_COMPILE}strip --strip-debug --remove-section=.BTF "/github/workspace/out/$RELEASE_KO"
        else
            llvm-strip --strip-debug --remove-section=.BTF "/github/workspace/out/$RELEASE_KO"
        fi
        
        echo "ARTIFACT_NAME=$FULL_KMI-artifacts" >> $GITHUB_ENV

    - name: Upload Dual-Track Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: /github/workspace/out/
