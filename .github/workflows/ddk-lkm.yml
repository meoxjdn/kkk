name: DDK Build Kernel Module

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version (e.g., android14-6.1)'
        required: true
        type: string
      ddk_release:
        description: 'DDK container release tag'
        required: false
        default: '20251016'
        type: string
      module_name:
        description: 'Kernel module name (without .ko)'
        required: false
        default: 'android-wuwa'
        type: string

jobs:
  build-module:
    name: Build ${{ inputs.module_name }} for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      # 拉取指定版本的 Android GKI 编译环境
      image: ghcr.io/ylarod/ddk:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Compile Kernel Module
      run: |
        echo "=== Building ${{ inputs.module_name }}.ko for KMI: ${{ inputs.kmi }} ==="
        make KDIR=$KERNEL_SRC
        
        mkdir -p /github/workspace/out
        
        # 使用完整的 KMI 字符串作为标识
        FULL_KMI="${{ inputs.kmi }}"
        DEBUG_KO="${FULL_KMI}-debug.ko"
        RELEASE_KO="${FULL_KMI}-release.ko"
        
        echo "=== Preserving Debug Symbols (For IDA Pro / Crash Analysis) ==="
        cp "${{ inputs.module_name }}.ko" "/github/workspace/out/$DEBUG_KO"

        echo "=== Stripping Symbols (For Stealth Deployment) ==="
        cp "${{ inputs.module_name }}.ko" "/github/workspace/out/$RELEASE_KO"
        
        # 优先使用内核编译环境内置的 strip 工具链
        if [ -n "$STRIP" ] && command -v "$STRIP" &> /dev/null; then
            $STRIP -d "/github/workspace/out/$RELEASE_KO"
        elif [ -n "$CROSS_COMPILE" ] && command -v "${CROSS_COMPILE}strip" &> /dev/null; then
            ${CROSS_COMPILE}strip -d "/github/workspace/out/$RELEASE_KO"
        else
            # 降级退路
            llvm-strip -d "/github/workspace/out/$RELEASE_KO"
        fi
        
        # 将唯一的产物包名称写入环境变量
        echo "ARTIFACT_NAME=$FULL_KMI-artifacts" >> $GITHUB_ENV

    - name: Upload Dual-Track Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: /github/workspace/out/
